<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Daily">
  <title>Daily — Diego</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0b1220; --navy2:#1e293b; --blue:#3b82f6; --blue-lt:#60a5fa;
      --ink:#0f172a; --gray:#64748b; --gray2:#94a3b8; --line:#e8edf3;
      --bg:#eef2f7; --card:#ffffff; --green:#16a34a; --amber:#f59e0b; --red:#ef4444;
      --grad:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--ink);height:100dvh;display:flex;flex-direction:column;
      overflow:hidden;-webkit-font-smoothing:antialiased}

    /* header */
    .app-header{background:var(--navy);color:#fff;padding:14px 16px 12px;display:flex;
      align-items:center;justify-content:space-between;flex-shrink:0;
      box-shadow:0 2px 10px rgba(0,0,0,.15);z-index:5}
    .app-header-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
    .app-header-sub{font-size:11px;color:var(--blue-lt);margin-top:1px;font-weight:600}
    .share-btn{background:var(--grad);color:#fff;border:none;border-radius:99px;
      padding:9px 15px;font-size:12px;font-weight:700;cursor:pointer;
      box-shadow:0 2px 8px rgba(59,130,246,.4)}
    .share-btn:active{transform:scale(.96)}

    #content{flex:1;overflow-y:auto;padding:14px 14px 20px;-webkit-overflow-scrolling:touch}

    /* tab bar */
    .tab-bar{display:flex;background:var(--navy);flex-shrink:0;
      padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px}
    .tab-btn{flex:1;background:none;border:none;color:#64748b;padding:8px 4px;
      font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;
      align-items:center;gap:3px;border-radius:12px;transition:all .15s}
    .tab-btn .ti{font-size:20px}
    .tab-btn.active{color:#fff;background:rgba(59,130,246,.18)}
    .tab-btn.active .ti{transform:translateY(-1px)}

    /* hero */
    .hero{background:var(--grad);color:#fff;padding:18px;border-radius:18px;margin-bottom:14px;
      box-shadow:0 8px 24px rgba(30,58,138,.3);display:flex;align-items:center;
      justify-content:space-between;gap:14px}
    .hero-title{font-size:19px;font-weight:800;line-height:1.25;letter-spacing:-.3px}
    .hero-sub{font-size:12px;color:#dbeafe;margin-top:5px;font-weight:600}
    .hero-flat{display:block}

    /* progress ring */
    .ring{flex-shrink:0;width:64px;height:64px;position:relative}
    .ring svg{transform:rotate(-90deg)}
    .ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:800;color:#fff}

    /* stat cards */
    .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
    .stat-card{background:var(--card);border-radius:14px;padding:13px 14px;
      box-shadow:0 2px 10px rgba(15,23,42,.06);position:relative;overflow:hidden}
    .stat-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
    .stat-label{font-size:9px;font-weight:800;color:var(--gray);letter-spacing:.6px;text-transform:uppercase}
    .stat-val{font-size:23px;font-weight:800;margin:3px 0;letter-spacing:-.5px}
    .stat-sub{font-size:10px;color:var(--gray)}

    .section-title{font-size:12px;font-weight:800;color:var(--gray);margin:18px 0 9px;
      text-transform:uppercase;letter-spacing:.7px}

    .card{background:var(--card);border-radius:16px;padding:6px 16px;
      box-shadow:0 2px 10px rgba(15,23,42,.06);margin-bottom:10px}

    /* checklist */
    .todo{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line)}
    .todo:first-child{border-top:none}
    .todo input{appearance:none;-webkit-appearance:none;width:24px;height:24px;flex-shrink:0;
      border:2px solid #cbd5e1;border-radius:8px;cursor:pointer;position:relative;transition:all .15s}
    .todo input:checked{background:var(--green);border-color:var(--green)}
    .todo input:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;
      justify-content:center;color:#fff;font-size:15px;font-weight:800}
    .todo label{font-size:14.5px;line-height:1.35}
    .todo.done label{color:var(--gray2);text-decoration:line-through}

    /* exercise */
    .ex{padding:14px 0;border-top:1px solid var(--line)}
    .ex:first-child{border-top:none}
    .ex-name{font-size:15px;font-weight:700;color:var(--ink)}
    .ex-target{font-size:11px;color:var(--gray);margin:3px 0 8px;font-weight:600}
    .ex-note{font-size:11px;color:var(--amber);margin-top:6px;font-weight:600}
    .ex-how{margin-top:8px}
    .ex-how summary{font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;
      list-style:none;padding:6px 0;user-select:none}
    .ex-how summary::-webkit-details-marker{display:none}
    .ex-how[open] summary{color:var(--gray)}
    .cues{margin:4px 0 8px 18px;font-size:12.5px;line-height:1.6;color:var(--ink)}
    .demo-link{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:700;
      color:#fff;background:#ef4444;padding:7px 14px;border-radius:99px;text-decoration:none}
    .demo-link:active{opacity:.8}
    .snap-btn{width:100%;background:var(--grad);color:#fff;border:none;border-radius:12px;
      padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin:6px 0;
      box-shadow:0 3px 10px rgba(59,130,246,.35)}
    .snap-btn:active{transform:scale(.98)}
    .meal-loading{padding:18px;text-align:center;color:var(--gray);font-weight:700;font-size:14px}
    .meal-err{padding:14px;background:#fef2f2;color:#b91c1c;border-radius:12px;font-size:13px;margin-top:8px}
    .meal-card{margin-top:10px;border:1.5px solid var(--line);border-radius:14px;padding:14px;background:#f8fafc}
    .meal-items{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:10px}
    .meal-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
    .mm{background:#fff;border-radius:10px;padding:9px 4px;text-align:center;box-shadow:0 1px 4px rgba(15,23,42,.06)}
    .mm b{display:block;font-size:18px;font-weight:800;color:var(--blue)}
    .mm span{font-size:9px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.4px}
    .ex input[type=text],.field input,.field textarea{width:100%;padding:11px 12px;
      border:1.5px solid var(--line);border-radius:11px;font-size:15px;background:#f8fafc;
      -webkit-appearance:none;transition:border-color .15s}
    .ex input[type=text]:focus,.field input:focus,.field textarea:focus{outline:none;
      border-color:var(--blue);background:#fff}
    .field textarea{min-height:64px;resize:vertical}

    .day-head{font-size:15px;font-weight:800;color:#fff;background:var(--navy2);
      padding:11px 16px;border-radius:14px 14px 0 0;margin-top:14px}
    .day-focus{font-size:11px;color:var(--blue-lt);font-weight:600;margin-top:2px}
    .day-card{border-radius:0 0 16px 16px;margin-top:0}

    .field{margin-bottom:12px}
    .field label{display:block;font-size:10px;font-weight:800;color:var(--gray);
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}

    .note{font-size:11.5px;color:var(--gray);margin:8px 0;line-height:1.5}
    .chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 11px;border-radius:99px;
      background:#dbeafe;color:#1d4ed8;margin-bottom:6px}

    .ev{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-top:1px solid var(--line)}
    .ev:first-child{border-top:none}
    .ev-name{font-size:14.5px;font-weight:700}
    .ev-meta{font-size:11px;color:var(--gray);margin-top:2px}
    .ev-days{font-size:15px;font-weight:800;color:var(--blue);flex-shrink:0;margin-left:10px}
    .ev-days.soon{color:var(--amber)}

    ul.principles{margin-left:18px;font-size:13.5px;line-height:1.7;color:var(--ink)}
    .empty{text-align:center;color:var(--gray);padding:36px;font-size:13px}

    .saved-flash{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(10px);
      background:var(--green);color:#fff;padding:9px 18px;border-radius:99px;font-size:12.5px;
      font-weight:700;opacity:0;transition:all .3s;z-index:99;box-shadow:0 4px 14px rgba(22,163,74,.4)}
    .saved-flash.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ===== set logger (scroll wheels) ===== */
    .lift{margin-top:6px}
    .set-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
    .set-chip{font-size:13px;font-weight:800;padding:6px 12px;border-radius:10px;
      border:1.5px solid var(--line);background:#f8fafc;color:var(--gray);cursor:pointer;
      min-width:54px;transition:all .12s}
    .set-chip.sel{background:var(--blue);color:#fff;border-color:var(--blue);
      box-shadow:0 2px 8px rgba(59,130,246,.35)}
    .set-chip:active{transform:scale(.95)}
    .set-add{font-size:12px;font-weight:800;padding:6px 12px;border-radius:10px;
      border:1.5px dashed #cbd5e1;background:none;color:var(--blue);cursor:pointer}
    .wheels{display:flex;gap:10px}
    .wheel-col{flex:1;min-width:0}
    .wheel-cap{font-size:9px;font-weight:800;color:var(--gray);text-transform:uppercase;
      letter-spacing:.5px;text-align:center;margin-bottom:5px}
    .stepper{display:flex;align-items:center;gap:5px}
    .step{flex:0 0 34px;height:42px;border:1.5px solid var(--line);background:#f8fafc;
      border-radius:11px;font-size:22px;font-weight:700;color:var(--blue);cursor:pointer;line-height:1}
    .step:active{background:#eef2f7;transform:scale(.94)}
    .wheel{position:relative;flex:1;min-width:0;height:48px;overflow-x:auto;overflow-y:hidden;
      scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;
      -webkit-mask-image:linear-gradient(90deg,transparent,#000 24%,#000 76%,transparent);
      mask-image:linear-gradient(90deg,transparent,#000 24%,#000 76%,transparent)}
    .wheel::-webkit-scrollbar{display:none}
    .wheel-track{display:flex;align-items:center;height:100%}
    .wheel-pad{flex:0 0 calc(50% - 28px)}
    .wheel-item{flex:0 0 56px;height:100%;scroll-snap-align:center;border:none;background:none;
      cursor:pointer;font-size:15px;font-weight:700;color:var(--gray2);
      transition:color .12s,font-size .12s,transform .12s}
    .wheel-item.on{color:var(--blue);font-weight:800;font-size:18px;transform:scale(1.04)}
    .wheel-center{position:absolute;left:50%;top:4px;bottom:4px;width:54px;transform:translateX(-50%);
      border-radius:11px;background:rgba(59,130,246,.08);border:1.5px solid rgba(59,130,246,.4);
      pointer-events:none;z-index:0}
    .lift-actions{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
    .set-del,.type-toggle{font-size:11.5px;font-weight:700;background:none;border:none;cursor:pointer;padding:4px}
    .set-del{color:var(--gray)}
    .type-toggle{color:var(--blue)}
    .lift-manual{margin-top:2px}

    /* unit toggle */
    .unit-row{display:flex;align-items:center;justify-content:space-between;
      background:var(--card);border-radius:12px;padding:10px 14px;margin-bottom:6px;
      box-shadow:0 2px 10px rgba(15,23,42,.06)}
    .unit-lbl{font-size:12px;font-weight:800;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
    .unit-toggle{display:flex;background:#eef2f7;border-radius:10px;padding:3px;gap:2px}
    .unit-btn{border:none;background:none;font-size:14px;font-weight:800;color:var(--gray);
      padding:6px 18px;border-radius:8px;cursor:pointer}
    .unit-btn.on{background:var(--blue);color:#fff;box-shadow:0 1px 4px rgba(59,130,246,.4)}
    /* add / remove custom exercise */
    .add-ex{width:100%;border:1.5px dashed #cbd5e1;background:none;color:var(--blue);
      font-size:13px;font-weight:800;padding:11px;border-radius:11px;cursor:pointer;margin-top:6px}
    .add-ex:active{background:#f8fafc}
    .ex-name{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .rm-ex{border:none;background:none;color:var(--red);font-size:15px;font-weight:800;
      cursor:pointer;padding:0 4px;flex-shrink:0}
  </style>
</head>
<body>
  <div class="app-header">
    <div>
      <div class="app-header-title">Daily</div>
      <div class="app-header-sub" id="hdr-date">Road to LA28</div>
    </div>
    <button class="share-btn" onclick="shareDay()">📋 Share day</button>
  </div>

  <div id="content"></div>
  <div class="saved-flash" id="flash">Saved ✓</div>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="today" onclick="setTab('today')"><span class="ti">✅</span>Today</button>
    <button class="tab-btn" data-tab="train" onclick="setTab('train')"><span class="ti">🏋️</span>Train</button>
    <button class="tab-btn" data-tab="eat" onclick="setTab('eat')"><span class="ti">🍽️</span>Eat</button>
    <button class="tab-btn" data-tab="schedule" onclick="setTab('schedule')"><span class="ti">🗓️</span>Plan</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
